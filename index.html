<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huokaing Thara 🏦 VIP Baccarat - $100,000 Welcome Bonus</title>
  <meta name="description" content="Huokaing Thara Casino - VIP AI Deepfake Live Dealer. $100,000 Free Bonus + Digital Bank Integration.">
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23ffd700'>HT</text></svg>">
</head>
<body>

  <div class="bank-integration">
  <iframe src="https://tharahuokaing.github.io/bank/"
          title="Huokaing Thara Digital Bank"
          frameborder="0"
          class="bank-iframe"
          loading="lazy"></iframe>

  <button id="bankToggle" class="bank-toggle">🏦 BANK</button>
</div>

<script>
  document.getElementById("bankToggle").addEventListener("click", function() {
      window.location.href = "https://tharahuokaing.github.io/bank/";
  });
</script>

  <div class="casino-particles">
    <div class="particle gold"></div>
    <div class="particle cyan"></div>
    <div class="particle magenta"></div>
    <div class="particle gold"></div>
    <div class="particle cyan"></div>
    <div class="particle gold"></div>
  </div>

  <header class="game-header">
    <div class="casino-logo">
      <h1 class="title">HUOKAING THARA</h1>
      <div class="logo-glow">🏦</div>
    </div>
    <p class="subtitle">VIP LIVE DEEPFAKE DEALER</p>
    <div class="bonus-banner">
      <span class="bonus-text">$100,000 WELCOME BONUS</span>
      <span class="bonus-glow"></span>
    </div>
  </header>

    <div id="dealer" class="ai-dealer-container">
    <div class="ai-avatar-wrapper">
      <img id="aiDealerImg" 
           src="image/dealer.png" 
           alt="Huokaing Thara VIP Dealer" 
           class="ai-dealer-img">
    
      <div class="ai-glitch-overlay"></div>
      <div class="ai-hud-frame"></div>
      <div class="ai-scanline"></div> 
    </div>

    <div class="dealer-status">
      <div class="pulse-wrapper">
        <span class="status-light active" id="statusLight"></span>
        <span class="pulse-ring"></span>
      </div>
      <span id="dealerStatus">DEEPFAKE AI LIVE</span>
    </div>
  </div>
    
  <main id="game">
    <div class="hand player" id="playerHand">
      <h2 class="hand-title">👤 PLAYER</h2>
      <div class="cards-container" id="playerCards" data-position-x="25%" data-position-y="50%"></div>
      <p class="total-display">Total: <span class="total" id="playerTotal">0</span></p>
    </div>

    <div class="hand banker" id="bankerHand">
      <h2 class="hand-title">🏦 BANKER</h2>
      <div class="cards-container" id="bankerCards" data-position-x="75%" data-position-y="50%"></div>
      <p class="total-display">Total: <span class="total" id="bankerTotal">0</span></p>
    </div>
  </main>

  <section id="betting">
    <div class="stats-row">
      <div class="stat-item">💰 Balance: $<span id="balance">100000</span></div>
      <div class="stat-item">🔥 Streak: <span id="winStreak">0</span></div>
      <div class="stat-item">🎯 Bet: $<span id="currentBetAmount">0</span></div>
    </div>

    <div id="chipsContainer" class="chips-grid">
      <button class="chip" data-value="10000">$10K</button>
      <button class="chip" data-value="25000">$25K</button>
      <button class="chip" data-value="50000">$50K</button>
      <button class="chip" data-value="100000">$100K</button>
      <button class="chip" data-value="500000">$500K</button>
      <button class="chip big-chip" data-value="1000000">$1M</button>
    </div>

    <div class="bet-section">
      <label>Select Bet Type:</label>
      <div id="betOptions" class="bet-buttons">
        <button class="bet-btn" data-bet="Player">👤 Player<br><small>1.95x</small></button>
        <button class="bet-btn banker-bet selected" data-bet="Banker">🏦 Banker<br><small>1.90x</small></button>
        <button class="bet-btn" data-bet="Tie">🤝 Tie<br><small>8.00x</small></button>
      </div>
    </div>

      <div class="bet-controls">
        <span class="bet-info">Selected: <strong id="currentBetText">Banker</strong></span>
        <button id="clearBet" class="clear-btn">🗑️ Clear Bet</button>
      </div>
    </section>

      <div id="controls" class="control-panel">
        <button id="dealBtn" class="main-btn" disabled>🎲 DEAL CARDS</button>
        <button id="fastDealBtn" class="secondary-btn" disabled>⚡ FAST DEAL</button>
        <button id="resetBtn" class="secondary-btn" disabled>🔄 NEW HAND</button>
    </div>

    <section id="results-section">
      <h2 id="result" class="result-text">Ready for VIP Stakes</h2>
    <div class="history-section">
      <h4>🕒 Huokaing Thara History</h4>
      <div id="gameHistory" class="history-panel"></div>
    </div>
  </section>

  <footer class="ui-overlay">
    <button id="soundToggle" class="sound-btn">🔊</button>
  </footer>

  <script src="script.js"></script>
  <script src="ultra_secure_mode.js"></script>
</body>
</html>
